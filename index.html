<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal LIS Autocomplete</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <div class="mac-buttons">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>
            <div class="title">Terminal - LIS Autocomplete</div>
            <div id="telemetry" style="font-size: 12px; color: #555; font-family: monospace;" title="Tempo de Execução LIS">0.00ms</div>
        </header>
        
        <main class="terminal-body">
            <div class="output-area" id="output-area">
                <p>Bem-vindo ao Motor LIS (Longest Increasing Subsequence).</p>
                <p>Digite sua sequência abaixo. Analisaremos em tempo real.</p>
            </div>
            <div class="input-line">
                <span class="prompt">miguel@lis:~$</span>
                <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </main>
        
        <footer class="suggestions-panel" id="suggestions-panel">
            <div class="panel-title">Sugestões / Correções (LIS)</div>
            <div id="correction-output" class="correction-content">
                <span class="placeholder">Aguardando entrada de dados...</span>
            </div>
        </footer>
    </div>
    <script src="js/dictionary.js"></script>
    <script src="js/lis.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
